<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fff0f5;
      color: #333;
    }

    header {
      background: #ffc0cb;
      padding: 20px;
      text-align: center;
    }

    header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
    }

    section {
      padding: 30px;
      margin: 20px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #ff69b4;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    ul {
      padding-left: 20px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #ffc0cb;
    }

    .upload {
      margin-top: 10px;
    }

    .contact a {
      display: block;
      color: #ff69b4;
      text-decoration: none;
      margin: 5px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>My Portfolio</h1>
  <img id="profileImage" src="https://via.placeholder.com/120" alt="Profile">
  <div class="upload">
    <input type="file" id="imageUpload">
  </div>
</header>

<div class="container">

  <section>
    <h2>Giới thiệu bản thân</h2>
    <p>Viết một đoạn giới thiệu ngắn về bạn...</p>
  </section>

  <section>
    <h2>Học vấn</h2>
    <ul>
      <li>Trường...</li>
      <li>Chuyên ngành...</li>
    </ul>
  </section>

  <section>
    <h2>Sự kiện đã tham gia</h2>
    <ul>
      <li>Sự kiện 1</li>
      <li>Sự kiện 2</li>
    </ul>
  </section>

  <section>
    <h2>Chứng nhận / Thành tích</h2>
    <ul>
      <li>Chứng nhận 1</li>
      <li>Thành tích 2</li>
    </ul>
  </section>

  <section class="contact">
    <h2>Liên hệ</h2>
    <a href="#">Email: your@email.com</a>
    <a href="#">Facebook</a>
    <a href="#">LinkedIn</a>
  </section>

</div>

<footer>
  <p>© 2026 My Portfolio</p>
</footer>

<script>
  const imageUpload = document.getElementById('imageUpload');
  const profileImage = document.getElementById('profileImage');

  imageUpload.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        profileImage.src = e.target.result;
      }
      reader.readAsDataURL(file);
    }
  });
</script>

</body>
</html>
