<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Lily Portfolio 🌸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #ffd6ec, #d6f0ff);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #555;
    }

    .card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(255, 182, 193, 0.4);
      width: 350px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 32px;
      color: #ff69b4;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .btn {
      background: #ff9ecf;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 500;
    }

    .btn:hover {
      background: #ff69b4;
    }

    .music-note {
      position: absolute;
      font-size: 24px;
      animation: rise 6s linear infinite;
      opacity: 0.7;
    }

    @keyframes rise {
      0% {
        transform: translateY(100vh);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Hi, I'm Lily 🌸</h1>
    <p>Welcome to my cute pastel world ✨</p>
    <button class="btn" onclick="playMusic()">🎵 Play Music</button>
  </div>

  <!-- Nhạc nền -->
  <audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("bg-music");

    function playMusic() {
      music.play();
    }
